# CI — runs on every pull request and every push to main.
# Four gates must all pass before a PR can be merged:
#   1. lint    — ESLint (no errors allowed)
#   2. typecheck — tsc --noEmit (TypeScript compiler, no emit)
#   3. test    — Vitest unit tests
#   4. build   — Next.js production build (catches page/route errors)
#
# The four jobs run in parallel; each caches node_modules so
# subsequent runs restore dependencies in seconds.
#
# Required repository secrets: none (build uses || '' fallbacks for env vars).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler
        run: npx tsc --noEmit

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      # Provide placeholder values so Next.js can complete the build without
      # making real Supabase connections.  The app uses || '' fallbacks so
      # empty strings are safe here.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Next.js production build
        run: npm run build
