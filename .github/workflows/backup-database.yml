# Weekly Supabase database backup (Sunday morning).
#
# Backups are pushed directly to the private plvmx/campaign-app-backups repo —
# never uploaded as a GitHub Actions artifact on *this* repo. Public-repo Actions
# artifacts are downloadable by anyone with no repo access required, so an
# artifact here would leak the full database (real names, mobile numbers,
# campaign data) the moment this repo's visibility is ever made public.
#
# Required repository secrets:
#   SUPABASE_DB_URL    — Session (pooler) connection URI from Supabase's Connect
#                         panel. Use Session, not Direct: GitHub runners have no
#                         IPv6, and Direct is IPv6-only.
#   BACKUP_REPO_TOKEN  — a fine-grained PAT scoped only to campaign-app-backups,
#                         with Contents: read and write. See scripts/BACKUP_RESTORE.md.

name: Weekly database backup

on:
  schedule:
    # Sunday at 06:00 UTC (adjust for your timezone, e.g. 08:00 = 8am UTC)
    - cron: '0 6 * * 0'
  workflow_dispatch: # Allow manual run from Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest
    container:
      image: postgres:17-alpine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install git
        run: apk add --no-cache git

      - name: Run backup
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          chmod +x scripts/backup-database.sh
          ./scripts/backup-database.sh backup.sql.gz

      - name: Push backup to the private backups repo
        env:
          BACKUP_REPO_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
        run: |
          git clone --depth 1 "https://x-access-token:${BACKUP_REPO_TOKEN}@github.com/plvmx/campaign-app-backups.git" /tmp/backups-repo
          mkdir -p /tmp/backups-repo/backups
          mv backup.sql.gz "/tmp/backups-repo/backups/backup-$(date +%Y-%m-%d).sql.gz"
          cd /tmp/backups-repo
          git config user.name "campaign-app-backup-bot"
          git config user.email "actions@users.noreply.github.com"
          git add backups/
          git commit -m "Backup $(date +%Y-%m-%d)"
          git push origin main
