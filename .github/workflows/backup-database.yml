# Weekly Supabase database backup (Sunday morning).
# Add repository secret: SUPABASE_DB_URL (Direct connection URI from Supabase Dashboard).
# Backups are kept as workflow artifacts (default 90 days on GitHub free tier).

name: Weekly database backup

on:
  schedule:
    # Sunday at 06:00 UTC (adjust for your timezone, e.g. 08:00 = 8am UTC)
    - cron: '0 6 * * 0'
  workflow_dispatch: # Allow manual run from Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest
    container:
      image: postgres:15-alpine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run backup
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          chmod +x scripts/backup-database.sh
          ./scripts/backup-database.sh backup.sql.gz

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup.sql.gz
          retention-days: 90
